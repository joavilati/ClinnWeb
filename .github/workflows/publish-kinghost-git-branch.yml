name: Publish KingHost Git Branch

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: publish-kinghost-git-branch
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create .env
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          if [ -z "$APP_ENV" ]; then
            echo "GitHub secret APP_ENV is required." >&2
            exit 1
          fi

          printf '%s\n' "$APP_ENV" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build standalone app
        run: npm run build

      - name: Prepare artifact branch content
        run: |
          rm -rf /tmp/kinghost-git-branch
          mkdir -p /tmp/kinghost-git-branch/.next

          cp -R .next/standalone/. /tmp/kinghost-git-branch/
          cp -R .next/static /tmp/kinghost-git-branch/.next/static

          if [ -d public ]; then
            cp -R public /tmp/kinghost-git-branch/public
          fi

          find /tmp/kinghost-git-branch -name '*.map' -delete

          node <<'EOF'
          const fs = require('fs');
          const path = '/tmp/kinghost-git-branch/server.js';

          let content = fs.readFileSync(path, 'utf8');
          const original = "const currentPort = parseInt(process.env.PORT, 10) || 3000";
          const replacement = "const currentPort = parseInt(process.env.PORT || process.env.PORT_SERVER || '3000', 10) || 3000";

          if (!content.includes('process.env.PORT_SERVER')) {
            content = content.replace(original, replacement);
          }

          if (!content.includes('process.env.PORT_SERVER')) {
            throw new Error('Could not patch standalone server.js to support PORT_SERVER.');
          }

          fs.writeFileSync(path, content);
          EOF

          cat > /tmp/kinghost-git-branch/README.md <<'EOF'
          This branch contains the prebuilt Linux standalone artifact for KingHost Node.js deployment.

          Use this branch only as the publication target in KingHost's Git integration.
          EOF

      - name: Publish artifact branch
        env:
          DEPLOY_BRANCH: codex/kinghost-deploy
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/kinghost-git-branch

          git init
          git checkout -b "$DEPLOY_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Publish KingHost artifact from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "$DEPLOY_BRANCH"
