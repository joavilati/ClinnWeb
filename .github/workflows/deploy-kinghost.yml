name: Deploy KingHost

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: deploy-kinghost
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create .env
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          if [ -z "$APP_ENV" ]; then
            echo "GitHub secret APP_ENV is required." >&2
            exit 1
          fi

          printf '%s\n' "$APP_ENV" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build standalone app
        run: npm run build

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir -p deploy/.next

          cp -R .next/standalone/. deploy/
          cp -R .next/static deploy/.next/static

          if [ -d public ]; then
            cp -R public deploy/public
          fi

          node <<'EOF'
          const fs = require('fs');
          const path = 'deploy/server.js';

          let content = fs.readFileSync(path, 'utf8');
          const original = "const currentPort = parseInt(process.env.PORT, 10) || 3000";
          const replacement = "const currentPort = parseInt(process.env.PORT || process.env.PORT_SERVER || '3000', 10) || 3000";

          if (!content.includes('process.env.PORT_SERVER')) {
            content = content.replace(original, replacement);
          }

          if (!content.includes('process.env.PORT_SERVER')) {
            throw new Error('Could not patch deploy/server.js to support PORT_SERVER.');
          }

          fs.writeFileSync(path, content);
          EOF

      - name: Deploy via FTPS
        env:
          KH_HOST: ${{ secrets.KH_HOST }}
          KH_USER: ${{ secrets.KH_USER }}
          KH_PASSWORD: ${{ secrets.KH_PASSWORD }}
          KH_PATH: ${{ secrets.KH_PATH }}
        run: |
          if [ -z "$KH_HOST" ] || [ -z "$KH_USER" ] || [ -z "$KH_PASSWORD" ]; then
            echo "GitHub secrets KH_HOST, KH_USER and KH_PASSWORD are required." >&2
            exit 1
          fi

          python3 <<'PY'
          import os
          import posixpath
          import ssl
          import traceback
          from ftplib import FTP_TLS
          from pathlib import Path

          host = os.environ["KH_HOST"]
          user = os.environ["KH_USER"]
          password = os.environ["KH_PASSWORD"]
          local_root = Path("deploy")
          fallback_host = "ftp.nodejsng1f02.kinghost.net"

          remote_path = "/apps_nodejs"

          if not local_root.exists():
            raise SystemExit("Local deploy directory was not created.")

          print(f"Deploying {local_root} to {host}:{remote_path}")

          ftp = None

          def normalize_names(names: list[str]) -> list[str]:
            normalized = []
            for name in names:
              if not name or name in (".", ".."):
                continue
              normalized.append(posixpath.basename(name.rstrip("/")))
            return sorted(set(normalized))

          def ensure_dir(path: str) -> None:
            try:
              ftp.cwd(path)
              return
            except Exception:
              raise RuntimeError(f"Remote directory is not accessible: {path}")

          def is_dir(path: str) -> bool:
            try:
              ftp.cwd(path)
              return True
            except Exception:
              return False

          def list_entries(path: str) -> dict[str, str]:
            ftp.cwd(path)
            entries: dict[str, str] = {}
            try:
              for name, facts in ftp.mlsd():
                if name in (".", ".."):
                  continue
                entries[name] = facts.get("type", "")
            except Exception:
              for name in normalize_names(ftp.nlst()):
                child = posixpath.join(path, name)
                entries[name] = "dir" if is_dir(child) else "file"
            return entries

          def remove_tree(path: str) -> None:
            try:
              ftp.cwd(path)
            except Exception:
              try:
                ftp.delete(path)
              except Exception:
                pass
              return

            for name, facts in list_entries(path).items():
              child = posixpath.join(path, name)
              if facts == "dir":
                remove_tree(child)
              else:
                ftp.delete(child)

            ftp.rmd(path)

          def sync_dir(local_dir: Path, remote_dir: str) -> None:
            ensure_dir(remote_dir)
            remote_entries = list_entries(remote_dir)
            local_entries = {path.name: path for path in local_dir.iterdir()}

            for name, remote_type in remote_entries.items():
              if name in local_entries:
                continue
              child = posixpath.join(remote_dir, name)
              if remote_type == "dir":
                remove_tree(child)
              else:
                ftp.delete(child)

            for name, path in local_entries.items():
              remote_child = posixpath.join(remote_dir, name)
              if path.is_dir():
                sync_dir(path, remote_child)
              else:
                with path.open("rb") as handle:
                  ftp.storbinary(f"STOR {remote_child}", handle)

          try:
            errors = []
            ftp_hosts = [host]
            if fallback_host not in ftp_hosts:
              ftp_hosts.append(fallback_host)

            for candidate_host in ftp_hosts:
              try:
                ftp = FTP_TLS(context=ssl._create_unverified_context(), timeout=30)
                ftp.connect(candidate_host, 21)
                ftp.login(user, password)
                ftp.prot_p()
                ftp.set_pasv(True)
                print(f"Connected to FTPS host {candidate_host}.")
                ensure_dir(remote_path)
                print(f"Using FTPS host {candidate_host}.")
                break
              except Exception as exc:
                errors.append(f"{candidate_host}: {type(exc).__name__}: {exc}")
                if ftp is not None:
                  try:
                    ftp.quit()
                  except Exception:
                    pass
                  ftp = None

            if ftp is None:
              raise RuntimeError("No FTPS host could access the remote directory. " + " | ".join(errors))

            sync_dir(local_root, remote_path)
            print("Remote entries after deploy:", sorted(list_entries(remote_path)))
          except Exception as exc:
            traceback.print_exc()
            print(f"::error::FTPS deploy failed: {type(exc).__name__}: {exc}")
            raise
          finally:
            if ftp is not None:
              try:
                ftp.quit()
              except Exception:
                pass
          PY
